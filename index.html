<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Website</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <header>
      <nav class="navbar flex container">
        <a href="#" class="logo"> Buzz<span>Buy.</span> </a>

        <ul class="navlist flex">
          <li><a href="#" class="link link-active">Home</a></li>
          <li><a href="#" class="link">Shop</a></li>
          <li><a href="#" class="link">Page</a></li>
          <li><a href="#" class="link">Blog</a></li>

          <li class="nav-icons flex">
            <a href="#" class="icon">
              <i class="fa-solid fa-magnifying-glass"></i>
            </a>

            <a href="#" class="icon">
              <i class="fa-solid fa-user"></i>
            </a>

            <a href="#" class="icon icon-active">
              <i class="fa-solid fa-bag-shopping"></i>
            </a>
          </li>
        </ul>

        <a href="#" class="hamburger">
          <i class="fa-solid fa-bars"></i>
        </a>
      </nav>
    </header>

    <!-- sections Here-->

    <main>
      <section class="hero">
        <div class="hero-content flex container">
          <div>
            <h3>Summer Fashion</h3>
            <h1>New Collection</h1>
            <h4>Big Sale Of This Week up to <span>30%</span></h4>
            <button class="btn">Shop Now</button>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="category-container container">
          <div class="category">
            <img src="./images/for men.jpg" />
            <button class="btn">for Men's</button>
          </div>

          <div class="category">
            <img src="./images/for kids.jpg" />
            <button class="btn">for Kid's</button>
          </div>

          <div class="category">
            <img src="./images/for accessories.jpg" />
            <button class="btn">Accessories</button>
          </div>

          <div class="category">
            <img src="./images/for women.jpg" />
            <button class="btn">for women's</button>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
